name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm ci
          npm run build
        env:
          VITE_SUPABASE_URL: https://vqrpodmnzubpcsvqohwj.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_bISG70YeoKP4mu8BKlgsuQ_xPprjcc1

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
